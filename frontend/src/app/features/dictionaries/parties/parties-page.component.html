<h2>Контрагенти</h2>
<button mat-flat-button color="primary" (click)="openCreate()"><mat-icon>add</mat-icon> Додати</button>
<table mat-table [dataSource]="items()" class="mat-elevation-z1">
  <ng-container matColumnDef="role"><th mat-header-cell *matHeaderCellDef>Роль</th><td mat-cell *matCellDef="let r">{{ r.partyRole }}</td></ng-container>
  <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Назва</th><td mat-cell *matCellDef="let r">{{ r.name }}</td></ng-container>
  <ng-container matColumnDef="idNumber"><th mat-header-cell *matHeaderCellDef>ID</th><td mat-cell *matCellDef="let r">{{ r.idType }} {{ r.idNumber }}</td></ng-container>
  <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef></th><td mat-cell *matCellDef="let r">
    <button mat-icon-button (click)="openEdit(r)"><mat-icon>edit</mat-icon></button>
    <button mat-icon-button color="warn" (click)="delete(r)"><mat-icon>delete</mat-icon></button>
  </td></ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
