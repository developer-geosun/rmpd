<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>RMPD</mat-card-title>
      <mat-card-subtitle>Вхід у систему</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="username" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Пароль</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
        </mat-form-field>
        @if (error) {
          <p class="error">{{ error }}</p>
        }
        <button mat-flat-button color="primary" class="full-width" [disabled]="loading">
          @if (loading) {
            <mat-spinner diameter="20" />
          } @else {
            Увійти
          }
        </button>
      </form>
      <p class="hint">Demo: admin&#64;demo.local / admin123</p>
    </mat-card-content>
  </mat-card>
</div>
