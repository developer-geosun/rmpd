<div class="page-header">
  <h1>Декларації RMPD100</h1>
  <button mat-flat-button color="primary" type="button" (click)="create()">
    <mat-icon>add</mat-icon>
    Нова декларація
  </button>
</div>

<table mat-table [dataSource]="items()" class="mat-elevation-z1 full-width">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let row">{{ row.id }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Статус</th>
    <td mat-cell *matCellDef="let row">{{ row.status }}</td>
  </ng-container>

  <ng-container matColumnDef="cmrNumber">
    <th mat-header-cell *matHeaderCellDef>CMR №</th>
    <td mat-cell *matCellDef="let row">{{ row.cmrNumber || '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="referenceNumber">
    <th mat-header-cell *matHeaderCellDef>Референс SENT</th>
    <td mat-cell *matCellDef="let row">{{ row.referenceNumber || '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="updatedAt">
    <th mat-header-cell *matHeaderCellDef>Оновлено</th>
    <td mat-cell *matCellDef="let row">{{ row.updatedAt | date: 'short' }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let row">
      <a mat-button [routerLink]="['/declarations', row.id]">Відкрити</a>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
